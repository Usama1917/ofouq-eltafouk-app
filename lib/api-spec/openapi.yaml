openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Ofouq Eltafouk Educational Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: books
    description: Book browsing, reservation, and purchase
  - name: videos
    description: Educational video content
  - name: social
    description: Social feed posts and interactions
  - name: points
    description: Points system management
  - name: games
    description: Educational quiz games
  - name: rewards
    description: Rewards and gift redemption
  - name: openai
    description: OpenAI AI chat operations
  - name: admin
    description: Admin dashboard management
  - name: moderator
    description: Moderator content control

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Books
  /books:
    get:
      operationId: listBooks
      tags: [books]
      summary: List all books
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"
    post:
      operationId: createBook
      tags: [books]
      summary: Create a book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookBody"
      responses:
        "201":
          description: Created book
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"

  /books/{id}:
    get:
      operationId: getBook
      tags: [books]
      summary: Get a book by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Book details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Not found

  /books/{id}/reserve:
    post:
      operationId: reserveBook
      tags: [books]
      summary: Reserve a book
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reservation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookReservation"

  /books/{id}/purchase:
    post:
      operationId: purchaseBook
      tags: [books]
      summary: Purchase a book with points
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchase successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookPurchase"
        "400":
          description: Insufficient points

  # Videos
  /videos:
    get:
      operationId: listVideos
      tags: [videos]
      summary: List educational videos
      parameters:
        - name: subject
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of videos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"
    post:
      operationId: createVideo
      tags: [videos]
      summary: Create a video entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVideoBody"
      responses:
        "201":
          description: Created video
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"

  /videos/{id}:
    get:
      operationId: getVideo
      tags: [videos]
      summary: Get a video by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Video details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"

  # Social Feed
  /posts:
    get:
      operationId: listPosts
      tags: [social]
      summary: List social feed posts
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
    post:
      operationId: createPost
      tags: [social]
      summary: Create a social post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostBody"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{id}:
    get:
      operationId: getPost
      tags: [social]
      summary: Get a post by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
    delete:
      operationId: deletePost
      tags: [social]
      summary: Delete a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /posts/{id}/like:
    post:
      operationId: likePost
      tags: [social]
      summary: Like or unlike a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Like toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeResponse"

  /posts/{id}/comments:
    get:
      operationId: listComments
      tags: [social]
      summary: List comments on a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [social]
      summary: Comment on a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentBody"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  # Points
  /points:
    get:
      operationId: getPoints
      tags: [points]
      summary: Get current user points balance
      responses:
        "200":
          description: Points balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PointsBalance"

  /points/purchase:
    post:
      operationId: purchasePoints
      tags: [points]
      summary: Purchase points (simulated)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchasePointsBody"
      responses:
        "200":
          description: Points purchased
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PointsBalance"

  /points/history:
    get:
      operationId: getPointsHistory
      tags: [points]
      summary: Get points transaction history
      responses:
        "200":
          description: Transaction history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PointsTransaction"

  # Games
  /games:
    get:
      operationId: listGames
      tags: [games]
      summary: List available quiz games
      responses:
        "200":
          description: List of games
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Game"

  /games/{id}:
    get:
      operationId: getGame
      tags: [games]
      summary: Get a game with its questions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Game details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameWithQuestions"

  /games/{id}/submit:
    post:
      operationId: submitGameAnswers
      tags: [games]
      summary: Submit quiz answers and earn points
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitGameBody"
      responses:
        "200":
          description: Game result with points earned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameResult"

  # Rewards
  /rewards:
    get:
      operationId: listRewards
      tags: [rewards]
      summary: List available rewards
      responses:
        "200":
          description: List of rewards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reward"

  /rewards/{id}/redeem:
    post:
      operationId: redeemReward
      tags: [rewards]
      summary: Redeem a reward with points
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reward redeemed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedemptionResult"
        "400":
          description: Insufficient points

  /rewards/redemptions:
    get:
      operationId: listRedemptions
      tags: [rewards]
      summary: List user redemption history
      responses:
        "200":
          description: Redemption history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Redemption"

  # OpenAI Chat
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

  # Admin
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform overview statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
    post:
      operationId: createAdminUser
      tags: [admin]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAdminUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/users/{id}:
    put:
      operationId: updateAdminUser
      tags: [admin]
      summary: Update user role or status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAdminUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
    delete:
      operationId: deleteAdminUser
      tags: [admin]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/books:
    get:
      operationId: listAdminBooks
      tags: [admin]
      summary: List all books with admin details
      responses:
        "200":
          description: All books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"
    post:
      operationId: createAdminBook
      tags: [admin]
      summary: Create a new book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookBody"
      responses:
        "201":
          description: Created book
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"

  /admin/books/{id}:
    put:
      operationId: updateAdminBook
      tags: [admin]
      summary: Update a book
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookBody"
      responses:
        "200":
          description: Updated book
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
    delete:
      operationId: deleteAdminBook
      tags: [admin]
      summary: Delete a book
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/videos:
    get:
      operationId: listAdminVideos
      tags: [admin]
      summary: List all videos
      responses:
        "200":
          description: All videos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"
    post:
      operationId: createAdminVideo
      tags: [admin]
      summary: Create a video
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVideoBody"
      responses:
        "201":
          description: Created video
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"

  /admin/videos/{id}:
    put:
      operationId: updateAdminVideo
      tags: [admin]
      summary: Update a video
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVideoBody"
      responses:
        "200":
          description: Updated video
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
    delete:
      operationId: deleteAdminVideo
      tags: [admin]
      summary: Delete a video
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/rewards:
    get:
      operationId: listAdminRewards
      tags: [admin]
      summary: List all rewards
      responses:
        "200":
          description: All rewards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reward"
    post:
      operationId: createAdminReward
      tags: [admin]
      summary: Create a reward
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRewardBody"
      responses:
        "201":
          description: Created reward
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reward"

  /admin/rewards/{id}:
    put:
      operationId: updateAdminReward
      tags: [admin]
      summary: Update a reward
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRewardBody"
      responses:
        "200":
          description: Updated reward
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reward"
    delete:
      operationId: deleteAdminReward
      tags: [admin]
      summary: Delete a reward
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/games:
    get:
      operationId: listAdminGames
      tags: [admin]
      summary: List all games
      responses:
        "200":
          description: All games
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Game"
    post:
      operationId: createAdminGame
      tags: [admin]
      summary: Create a game
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGameBody"
      responses:
        "201":
          description: Created game
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"

  /admin/games/{id}:
    put:
      operationId: updateAdminGame
      tags: [admin]
      summary: Update a game
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGameBody"
      responses:
        "200":
          description: Updated game
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"
    delete:
      operationId: deleteAdminGame
      tags: [admin]
      summary: Delete a game
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/banners:
    get:
      operationId: listAdminBanners
      tags: [admin]
      summary: List all banners
      responses:
        "200":
          description: All banners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Banner"
    post:
      operationId: createAdminBanner
      tags: [admin]
      summary: Create a banner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBannerBody"
      responses:
        "201":
          description: Created banner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Banner"

  /admin/banners/{id}:
    put:
      operationId: updateAdminBanner
      tags: [admin]
      summary: Update a banner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBannerBody"
      responses:
        "200":
          description: Updated banner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Banner"
    delete:
      operationId: deleteAdminBanner
      tags: [admin]
      summary: Delete a banner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/purchases:
    get:
      operationId: listAdminPurchases
      tags: [admin]
      summary: List all book purchases
      responses:
        "200":
          description: All purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminPurchase"

  /admin/reservations:
    get:
      operationId: listAdminReservations
      tags: [admin]
      summary: List all book reservations
      responses:
        "200":
          description: All reservations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminReservation"

  /admin/redemptions:
    get:
      operationId: listAdminRedemptions
      tags: [admin]
      summary: List all reward redemptions
      responses:
        "200":
          description: All redemptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Redemption"

  /admin/points-transactions:
    get:
      operationId: listAdminPointsTransactions
      tags: [admin]
      summary: List all points transactions
      responses:
        "200":
          description: All transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PointsTransaction"

  /admin/reports:
    get:
      operationId: listAdminReports
      tags: [admin]
      summary: List all reports
      responses:
        "200":
          description: All reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentReport"

  /admin/reports/{id}:
    put:
      operationId: resolveAdminReport
      tags: [admin]
      summary: Resolve a report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveReportBody"
      responses:
        "200":
          description: Resolved report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentReport"

  # Moderator
  /moderator/posts:
    get:
      operationId: listModeratorPosts
      tags: [moderator]
      summary: List all posts for moderation
      responses:
        "200":
          description: All posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

  /moderator/posts/{id}:
    delete:
      operationId: deleteModeratorPost
      tags: [moderator]
      summary: Remove a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /moderator/comments:
    get:
      operationId: listModeratorComments
      tags: [moderator]
      summary: List all comments for moderation
      responses:
        "200":
          description: All comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"

  /moderator/comments/{id}:
    delete:
      operationId: deleteModeratorComment
      tags: [moderator]
      summary: Remove a comment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /moderator/reports:
    get:
      operationId: listModeratorReports
      tags: [moderator]
      summary: List reports assigned to moderators
      responses:
        "200":
          description: Reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentReport"
    post:
      operationId: createModeratorReport
      tags: [moderator]
      summary: Submit a content report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportBody"
      responses:
        "201":
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentReport"

  /moderator/reports/{id}:
    put:
      operationId: updateModeratorReport
      tags: [moderator]
      summary: Update report status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveReportBody"
      responses:
        "200":
          description: Updated report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentReport"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # Books
    Book:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        author:
          type: string
        description:
          type: string
        category:
          type: string
        coverUrl:
          type: string
        pointsPrice:
          type: integer
        available:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - author
        - description
        - category
        - pointsPrice
        - available
        - createdAt

    CreateBookBody:
      type: object
      properties:
        title:
          type: string
        author:
          type: string
        description:
          type: string
        category:
          type: string
        coverUrl:
          type: string
        pointsPrice:
          type: integer
        available:
          type: boolean
      required:
        - title
        - author
        - description
        - category
        - pointsPrice

    BookReservation:
      type: object
      properties:
        id:
          type: integer
        bookId:
          type: integer
        status:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - bookId
        - status
        - createdAt

    BookPurchase:
      type: object
      properties:
        id:
          type: integer
        bookId:
          type: integer
        pointsSpent:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - bookId
        - pointsSpent
        - createdAt

    # Videos
    Video:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        subject:
          type: string
        videoUrl:
          type: string
        thumbnailUrl:
          type: string
        duration:
          type: integer
        instructor:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - subject
        - videoUrl
        - duration
        - instructor
        - createdAt

    CreateVideoBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        subject:
          type: string
        videoUrl:
          type: string
        thumbnailUrl:
          type: string
        duration:
          type: integer
        instructor:
          type: string
      required:
        - title
        - description
        - subject
        - videoUrl
        - duration
        - instructor

    # Social
    Post:
      type: object
      properties:
        id:
          type: integer
        content:
          type: string
        authorName:
          type: string
        authorAvatar:
          type: string
        likesCount:
          type: integer
        commentsCount:
          type: integer
        isLiked:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - content
        - authorName
        - likesCount
        - commentsCount
        - isLiked
        - createdAt

    CreatePostBody:
      type: object
      properties:
        content:
          type: string
        authorName:
          type: string
        authorAvatar:
          type: string
      required:
        - content
        - authorName

    Comment:
      type: object
      properties:
        id:
          type: integer
        postId:
          type: integer
        content:
          type: string
        authorName:
          type: string
        authorAvatar:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - postId
        - content
        - authorName
        - createdAt

    CreateCommentBody:
      type: object
      properties:
        content:
          type: string
        authorName:
          type: string
        authorAvatar:
          type: string
      required:
        - content
        - authorName

    LikeResponse:
      type: object
      properties:
        liked:
          type: boolean
        likesCount:
          type: integer
      required:
        - liked
        - likesCount

    # Points
    PointsBalance:
      type: object
      properties:
        balance:
          type: integer
        totalEarned:
          type: integer
        totalSpent:
          type: integer
      required:
        - balance
        - totalEarned
        - totalSpent

    PurchasePointsBody:
      type: object
      properties:
        amount:
          type: integer
        packageName:
          type: string
      required:
        - amount
        - packageName

    PointsTransaction:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [earn, spend, purchase]
        amount:
          type: integer
        description:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - amount
        - description
        - createdAt

    # Games
    Game:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        subject:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard]
        questionsCount:
          type: integer
        pointsReward:
          type: integer
        description:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - subject
        - difficulty
        - questionsCount
        - pointsReward
        - description
        - createdAt

    Question:
      type: object
      properties:
        id:
          type: integer
        gameId:
          type: integer
        text:
          type: string
        options:
          type: array
          items:
            type: string
        correctIndex:
          type: integer
      required:
        - id
        - gameId
        - text
        - options
        - correctIndex

    GameWithQuestions:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        subject:
          type: string
        difficulty:
          type: string
        questionsCount:
          type: integer
        pointsReward:
          type: integer
        description:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - subject
        - difficulty
        - questionsCount
        - pointsReward
        - description
        - questions
        - createdAt

    SubmitGameBody:
      type: object
      properties:
        answers:
          type: array
          items:
            type: object
            properties:
              questionId:
                type: integer
              selectedIndex:
                type: integer
            required:
              - questionId
              - selectedIndex
      required:
        - answers

    GameResult:
      type: object
      properties:
        correctCount:
          type: integer
        totalQuestions:
          type: integer
        pointsEarned:
          type: integer
        newBalance:
          type: integer
      required:
        - correctCount
        - totalQuestions
        - pointsEarned
        - newBalance

    # Rewards
    Reward:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [book, gift, voucher]
        pointsCost:
          type: integer
        imageUrl:
          type: string
        available:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - type
        - pointsCost
        - available
        - createdAt

    RedemptionResult:
      type: object
      properties:
        success:
          type: boolean
        pointsSpent:
          type: integer
        newBalance:
          type: integer
        rewardTitle:
          type: string
      required:
        - success
        - pointsSpent
        - newBalance
        - rewardTitle

    Redemption:
      type: object
      properties:
        id:
          type: integer
        rewardId:
          type: integer
        rewardTitle:
          type: string
        pointsSpent:
          type: integer
        status:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - rewardId
        - rewardTitle
        - pointsSpent
        - status
        - createdAt

    # OpenAI
    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    # Admin schemas
    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalBooks:
          type: integer
        totalVideos:
          type: integer
        totalPosts:
          type: integer
        totalGames:
          type: integer
        totalRewards:
          type: integer
        totalPurchases:
          type: integer
        totalRedemptions:
          type: integer
        totalPointsCirculating:
          type: integer
        pendingReports:
          type: integer
      required:
        - totalUsers
        - totalBooks
        - totalVideos
        - totalPosts
        - totalGames
        - totalRewards
        - totalPurchases
        - totalRedemptions
        - totalPointsCirculating
        - pendingReports

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [student, admin, moderator]
        status:
          type: string
          enum: [active, suspended]
        avatarUrl:
          type: string
        joinedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - role
        - status
        - joinedAt

    CreateAdminUserBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [student, admin, moderator]
        status:
          type: string
      required:
        - name
        - email
        - role

    UpdateAdminUserBody:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [student, admin, moderator]
        status:
          type: string
          enum: [active, suspended]

    CreateRewardBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [book, gift, voucher]
        pointsCost:
          type: integer
        imageUrl:
          type: string
        available:
          type: boolean
      required:
        - title
        - description
        - type
        - pointsCost

    CreateGameBody:
      type: object
      properties:
        title:
          type: string
        subject:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard]
        pointsReward:
          type: integer
        description:
          type: string
      required:
        - title
        - subject
        - difficulty
        - pointsReward
        - description

    Banner:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        linkUrl:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - active
        - createdAt

    CreateBannerBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        linkUrl:
          type: string
        active:
          type: boolean
      required:
        - title

    AdminPurchase:
      type: object
      properties:
        id:
          type: integer
        bookId:
          type: integer
        bookTitle:
          type: string
        pointsSpent:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - bookId
        - pointsSpent
        - createdAt

    AdminReservation:
      type: object
      properties:
        id:
          type: integer
        bookId:
          type: integer
        bookTitle:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - bookId
        - status
        - createdAt

    ContentReport:
      type: object
      properties:
        id:
          type: integer
        targetType:
          type: string
        targetId:
          type: integer
        reason:
          type: string
        description:
          type: string
        reportedBy:
          type: string
        status:
          type: string
        resolvedBy:
          type: string
        resolvedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - targetType
        - targetId
        - reason
        - reportedBy
        - status
        - createdAt

    CreateReportBody:
      type: object
      properties:
        targetType:
          type: string
        targetId:
          type: integer
        reason:
          type: string
        description:
          type: string
        reportedBy:
          type: string
      required:
        - targetType
        - targetId
        - reason

    ResolveReportBody:
      type: object
      properties:
        status:
          type: string
          enum: [resolved, dismissed, escalated]
        resolvedBy:
          type: string
      required:
        - status
